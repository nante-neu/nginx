server {
    listen 80;
    server_name 192.168.100.234;
    return 301 https://$host$request_uri;
      
# HTTPS + WebSocket reverse proxy
server {
    listen 443 ssl;
    server_name 192.168.100.234;

    ssl_certificate /etc/ssl/incmuseumssl/cert.pem;
    ssl_certificate_key /etc/ssl/incmuseumssl/key.pem;

    # Security headers (optional)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 10M;

    # STATIC FILES
    location /static/ {
        alias /home/ubuntu/incmuseum/static_files/;
    }

    # MEDIA FILES
    location /media/ {
        alias /home/ubuntu/incmuseum/media/;
    }

    # NORMAL HTTP REQUESTS → Django via Daphne
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /detect-face/ {
        # 1. Point to your build folder
        alias /home/ubuntu/incmuseum/frontend/dist/; 
        
        # 2. Tell Nginx to look for the index file
        index index.html;
        
        # 3. Enable SPA routing (this is the key)
        try_files $uri $uri/ /detect-face/index.html;
    }

    # 🔌 WEBSOCKETS → Daphne (VERY IMPORTANT)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward original host/IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
